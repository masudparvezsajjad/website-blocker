name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            asset_name: mps-blocker_darwin_arm64
          - goos: darwin
            goarch: amd64
            asset_name: mps-blocker_darwin_amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Build
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -o dist/mps-blocker ./cmd/blocker

      - name: Package
        run: |
          mkdir -p package/${{ matrix.asset_name }}
          cp dist/mps-blocker package/${{ matrix.asset_name }}/mps-blocker
          cp README.md package/${{ matrix.asset_name }}/README.md
          tar -czf dist/${{ matrix.asset_name }}.tar.gz -C package/${{ matrix.asset_name }} .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}.tar.gz
